name: Garmin CN to Global Bridge

on:
  workflow_dispatch:
    inputs:
      only_run:
        description: 'Sync running activities only'
        required: false
        default: true
        type: boolean
  schedule:
    # Mondays 06:30 Asia/Shanghai. Existing Strava page sync runs at 08:00.
    - cron: '30 22 * * 0'

permissions:
  contents: read

concurrency:
  group: garmin-cn-to-global-bridge
  cancel-in-progress: false

env:
  GARMIN_BRIDGE_LATEST_COUNT: 50
  GARMIN_GLOBAL_COMPARE_COUNT: 200
  USE_CLOUDFLARE_WARP: false

jobs:
  bridge:
    name: Bridge Garmin CN to Garmin Global
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Cloudflare WARP
        if: env.USE_CLOUDFLARE_WARP == 'true'
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

      - name: Connect Cloudflare WARP
        if: env.USE_CLOUDFLARE_WARP == 'true'
        run: |
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          sleep 3
          warp-cli --accept-tos status

      - name: Restore bridge state
        uses: actions/cache@v4
        with:
          path: |
            FIT_OUT
            GPX_OUT
          key: garmin-cn-to-global-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            garmin-cn-to-global-${{ github.ref_name }}-
            garmin-cn-to-global-

      - name: Bridge new Garmin CN activities to Garmin Global
        env:
          GARMIN_SECRET_STRING_CN: ${{ secrets.GARMIN_SECRET_STRING_CN }}
          GARMIN_SECRET_STRING: ${{ secrets.GARMIN_SECRET_STRING }}
          ONLY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.only_run || 'true' }}
        run: |
          if [ -z "$GARMIN_SECRET_STRING_CN" ] || [ -z "$GARMIN_SECRET_STRING" ]; then
            echo "::error::Missing GARMIN_SECRET_STRING_CN or GARMIN_SECRET_STRING repository secret."
            exit 1
          fi

          mkdir -p FIT_OUT GPX_OUT

          only_run_arg=""
          if [ "$ONLY_RUN" = "true" ]; then
            only_run_arg="--only-run"
          fi

          python run_page/garmin_sync_cn_global.py \
            "$GARMIN_SECRET_STRING_CN" \
            "$GARMIN_SECRET_STRING" \
            $only_run_arg \
            --bridge-only \
            --skip-existing-global \
            --latest-count "$GARMIN_BRIDGE_LATEST_COUNT" \
            --global-compare-count "$GARMIN_GLOBAL_COMPARE_COUNT"

      - name: Disconnect Cloudflare WARP
        if: always() && env.USE_CLOUDFLARE_WARP == 'true'
        run: |
          warp-cli --accept-tos disconnect || true
